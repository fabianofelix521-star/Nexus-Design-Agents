name: VS Code Extension Release

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter nexus-vscode-extension typecheck
      - run: pnpm --filter nexus-vscode-extension build
      - run: pnpm --filter nexus-vscode-extension package:vsix
        env:
          NEXUS_VSCE_PUBLISHER: ${{ vars.NEXUS_VSCE_PUBLISHER || 'felix' }}
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-vscode-extension-vsix
          path: artifacts/*.vsix

  publish:
    runs-on: ubuntu-latest
    needs: package
    if: ${{ secrets.VSCE_PAT != '' && vars.NEXUS_VSCE_PUBLISHER != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter nexus-vscode-extension build
      - run: pnpm --filter nexus-vscode-extension publish:vsix
        env:
          NEXUS_VSCE_PUBLISHER: ${{ vars.NEXUS_VSCE_PUBLISHER }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}